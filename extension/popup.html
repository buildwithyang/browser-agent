<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 240px; margin: 0; padding: 14px 16px;
      font: 13px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
        "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #e6e8ee; background: #14161b;
    }
    h1 {
      margin: 0 0 10px; font-size: 11px; font-weight: 600;
      letter-spacing: .14em; text-transform: uppercase; color: #f5b544;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
    .label { color: #969cab; margin-bottom: 6px; }
    .options { display: flex; flex-direction: column; gap: 4px; }
    label.opt {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border: 1px solid #2a2e39; border-radius: 8px;
      cursor: pointer; transition: background .15s, border-color .15s;
    }
    label.opt:hover { background: #1b1e26; }
    label.opt.checked { border-color: #f5b544; background: rgba(245,181,68,.08); }
    input[type="radio"] { accent-color: #f5b544; margin: 0; }
    .hint { margin-top: 10px; color: #6b7280; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Agent Bridge</h1>
  <div class="label">输出语言 / Output language</div>
  <div class="options" id="options">
    <label class="opt"><input type="radio" name="lang" value="browser">跟随浏览器 / Follow browser</label>
    <label class="opt"><input type="radio" name="lang" value="zh">中文</label>
    <label class="opt"><input type="radio" name="lang" value="en">English</label>
    <label class="opt"><input type="radio" name="lang" value="auto">跟随页面 / Follow page</label>
  </div>
  <div class="hint" id="hint"></div>
  <div class="label" style="margin-top:14px">网关地址 / Gateway URL</div>
  <input id="gateway" type="text" spellcheck="false"
    style="width:100%;box-sizing:border-box;padding:7px 10px;border:1px solid #2a2e39;border-radius:8px;background:#1b1e26;color:#e6e8ee;font-size:12px"
    placeholder="https://browser.buildwithyang.com/api" />
  <div class="hint" id="gateway-hint">默认云端;自部署填 http://127.0.0.1:17321</div>
  <script type="module" src="popup.js"></script>
</body>
</html>
