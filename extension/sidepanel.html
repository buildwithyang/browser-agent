<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agent Bridge Workspace</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <main class="workspace-shell" aria-labelledby="workspace-title">
      <header class="workspace-header">
        <div class="workspace-title-row">
          <h1 id="workspace-title">Shared Workspace</h1>
          <span id="match-score" class="match-score" hidden></span>
        </div>
        <a id="source-link" class="source-link" href="#" target="_blank" rel="noopener noreferrer">
          <span id="source-host">No active page</span>
          <span aria-hidden="true">↗</span>
        </a>
      </header>

      <section
        id="timeline"
        class="timeline"
        aria-label="Shared history"
        aria-live="polite"
        aria-relevant="additions text"
      ></section>

      <footer id="composer" class="composer">
        <form id="message-form" novalidate>
          <div class="composer-heading">
            <label id="composer-label" for="message-input">Next instruction</label>
            <span id="turn-meter" class="turn-meter">0 / 10</span>
          </div>
          <div id="shortcut-chips" class="shortcut-chips" role="group" aria-label="Prompt shortcuts"></div>
          <div class="input-shell">
            <textarea
              id="message-input"
              rows="2"
              maxlength="10000"
              placeholder="Ask a question or direct the next revision…"
            ></textarea>
            <button id="send-button" type="submit" disabled>
              <span id="send-label">Send</span>
              <span aria-hidden="true">↑</span>
            </button>
          </div>
          <div id="composer-error" class="composer-error" role="alert" aria-live="assertive" hidden></div>
          <div class="composer-footer">
            <span id="composer-hint" class="composer-hint">Enter to send · Shift + Enter for a new line</span>
          </div>
        </form>
      </footer>
    </main>
    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
