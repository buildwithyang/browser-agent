# Agent Bridge web 容器的 nginx 配置：静态前端 + /api 反代网关。
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 简历上传 multipart：放宽请求体上限（与网关 RESUME_MAX_BYTES 默认 10MB 对齐，留余量）。
    client_max_body_size 20m;

    # 隐私政策：干净 URL /privacy 映射到打包出的静态页 /privacy.html
    # （Chrome 应用商店的隐私权网址用这个：https://<host>/privacy）。
    location = /privacy {
        try_files /privacy.html =404;
    }

    # SPA：静态资源命中则返回，否则回退到 index.html 交给前端路由。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Workspace 使用 NDJSON 增量返回；精确路由必须关闭代理缓冲与缓存。
    location = /api/tasks/workspace {
        proxy_pass http://gateway:17321/tasks/workspace;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 其他网关请求走同源 /api，反代到 gateway 容器。
    # proxy_pass 结尾的 "/" 会去掉 location 匹配的 /api 前缀，
    # 等价 vite.config.js 里的 rewrite: /^\/api/ -> ""。
    # 例：/api/auth/login -> http://gateway:17321/auth/login
    location /api/ {
        proxy_pass http://gateway:17321/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
